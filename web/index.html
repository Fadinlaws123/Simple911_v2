<!doctype html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Simple911</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div id="toastStack" class="toast-stack"></div>
    <div id="alertStack" class="alert-stack"></div>

    <section id="callsPanel" class="calls-panel hidden">
        <header>
            <div>
                <span class="eyebrow">
                    <svg class="ui-icon" viewBox="0 0 24 24" aria-hidden="true"><path d="M4 19h16M6 16h12M8 13h8M12 4v6M9 7l3-3 3 3"/></svg>
                    Simple911
                </span>
                <h1>Recent 911 Calls</h1>
                <p>Review active calls, attach to missed incidents, and manage your current response.</p>
            </div>
            <button id="closeCalls" class="icon-button" aria-label="Close recent calls">
                <svg class="ui-icon" viewBox="0 0 24 24" aria-hidden="true"><path d="M6 6l12 12M18 6L6 18"/></svg>
            </button>
        </header>
        <div id="callsList" class="calls-list"></div>
    </section>

    <script src="app.js"></script>
</body>
</html>
