<!doctype html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Simple911</title>
    <link rel="stylesheet" href="style.css">
    <link rel="stylesheet" href="recent.css">
</head>
<body>
    <div id="toastStack" class="toast-stack"></div>
    <div id="alertStack" class="alert-stack"></div>

    <section id="callsPanel" class="calls-panel hidden">
        <header>
            <div>
                <span class="eyebrow">Simple911</span>
                <h1>Recent 911 Calls</h1>
                <p>Review active calls, attach to missed incidents, and manage your current response.</p>
            </div>
            <button id="closeCalls" class="icon-button">×</button>
        </header>
        <div id="callsList" class="calls-list"></div>
    </section>

    <script src="app.js"></script>
</body>
</html>
